name: Release

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── PyPI ─────────────────────────────────────────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write   # PyPI Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Build distributions
        run: uv build

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@v1.14.0

  # ── DXT ──────────────────────────────────────────────────────────────────────
  build-dxt:
    name: Build & Release DXT
    runs-on: ubuntu-latest
    permissions:
      contents: write   # GitHub Release の作成・アセット添付
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Patch manifest version
        run: |
          jq --arg v "$VERSION" '.version = $v' manifest.json > manifest.tmp.json
          mv manifest.tmp.json manifest.json

      - name: Build .dxt archive
        run: |
          zip -r "docs-mcp-${VERSION}.dxt" \
            manifest.json \
            server/main.py \
            config.example.yaml \
            README.md \
            LICENSE

      - name: Create or Update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GITHUB_REF_NAME" > /dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "docs-mcp-${VERSION}.dxt" --clobber
          else
            gh release create "$GITHUB_REF_NAME" --generate-notes "docs-mcp-${VERSION}.dxt"
          fi

  # ── Docker (GitHub Container Registry) ───────────────────────────────────────
  build-docker:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # GitHub Container Registry (Docker)
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
